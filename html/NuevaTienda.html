<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Tienda</title>
    <link rel="stylesheet" href="../css/Formularios.css">
    <link rel="stylesheet" href="../css/Sidebar.css">
    <link rel="stylesheet" href="../css/Common.css">
    <link rel="stylesheet" href="../css/TablaEstilos.css">
    <script src="../javascript/IncludeHTML.js"></script>
    <script src="../javascript/Sidebar.js" defer></script>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <include-html src="../html/Sidebar.html"></include-html>
    </aside>

    <div class="right-content">

        <!-- Cabecera -->
        <header class="main-header">
            <nav>
                <div class="header-branding">
                    <img src="../images/icono.png" alt="Bancosol" class="header-logo">
                    <div class="header-titles">
                        <h1>Establecimientos</h1>
                        <p>Gestión de establecimientos participantes en las campañas</p>
                    </div>
                </div>
                <button class="btn btn--secondary" id="btn-notifications">
                    🔔 Notificaciones
                </button>
            </nav>
        </header>

        <!-- FORMULARIO -->
        <div class="form-container-centered">
            <div class="modal-card">

                <div class="modal-header">
                    <div>
                        <!-- El título cambia dinámicamente: "Nueva Tienda" o "Editar Tienda" -->
                        <h1 id="form-title">Nueva Tienda</h1>
                        <p id="form-subtitle">Añade un nuevo establecimiento a la base de datos</p>
                    </div>
                    <a href="InformacionTienda.html">
                        <button type="button" class="btn-close" title="Volver">&times;</button>
                    </a>
                </div>

                <form id="store-form">

                    <!-- Cadena + Nombre -->
                    <div class="form-row columns-2">
                        <div class="field-group">
                            <label for="chain-select">Cadena</label>
                            <select id="chain-select" name="chain_id">
                                <option value="mercadona">Mercadona</option>
                                <option value="carrefour">Carrefour</option>
                                <option value="dia">Dia</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label for="store-name">Nombre del establecimiento</label>
                            <input type="text" id="store-name" name="store_name"
                                   required placeholder="Ej: Carrefour Hiper">
                        </div>
                    </div>

                    <!-- Dirección -->
                    <div class="form-row">
                        <div class="field-group box-tipo-via">
                            <label for="street-type">Tipo de Vía</label>
                            <select id="street-type" name="street_type">
                                <option value="street">Calle</option>
                                <option value="avenue">Avenida</option>
                                <option value="square">Plaza</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label for="street-address">Nombre de la vía</label>
                            <input type="text" id="street-address" name="street_address"
                                   required placeholder="Nombre">
                        </div>
                    </div>

                    <!-- Número / CP / Distrito -->
                    <div class="form-row">
                        <div class="field-group box-numero">
                            <label for="building-number">Número</label>
                            <input type="text" id="building-number" name="building_number"
                                   minlength="1" maxlength="3" placeholder="Ej: 12">
                        </div>
                        <div class="field-group box-cp">
                            <label for="zip-code">Cód. Postal</label>
                            <input type="text" id="zip-code" name="zip_code"
                                   minlength="5" maxlength="5" pattern="[0-9]{5}"
                                   title="Introduce exactamente 5 dígitos" placeholder="29XXX">
                        </div>
                        <div class="field-group box-distrito">
                            <label for="district-name">Distrito</label>
                            <input type="text" id="district-name" name="district_name"
                                   minlength="1" maxlength="2" placeholder="Ej: 3">
                        </div>
                    </div>

                    <!-- Localidad / Zona -->
                    <div class="form-row columns-2">
                        <div class="field-group">
                            <label for="city-name">Localidad</label>
                            <input type="text" id="city-name" name="city_name"
                                   required placeholder="Ciudad">
                        </div>
                        <div class="field-group">
                            <label for="geo-zone">Zona Geográfica</label>
                            <input type="text" id="geo-zone" name="geo_zone"
                                   placeholder="Comarca o zona">
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="InformacionTienda.html">
                            <button type="button" class="btn-cancel">Cancelar</button>
                        </a>
                        <!-- type="button" para interceptar el click antes de validar el form -->
                        <button type="button" class="btn-save" id="btn-save">Guardar tienda</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

</div>

<!-- ── Pop-up confirmación de guardado ── -->
<div class="delete-overlay" id="save-overlay">
    <div class="delete-popup">
        <div class="delete-icon" style="background:#e0f2fe; color:#0369a1;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
        </div>
        <h3 id="save-popup-title">¿Guardar establecimiento?</h3>
        <p id="save-popup-msg">Los datos introducidos se guardarán en la base de datos.</p>
        <div class="delete-popup-actions">
            <button class="btn-cancel-del" id="btn-cancel-save">Cancelar</button>
            <button class="btn-confirm-del" id="btn-confirm-save"
                    style="background:#420098;">Guardar</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {

        // ── Datos de ejemplo (en producción vendrían del servidor) ──────────────
        // Deben coincidir con los de InformacionTienda.js
        const storeData = {
            'Carrefour Hiper': {
                chain: 'carrefour', storeName: 'Carrefour Hiper',
                streetType: 'street', streetAddress: 'Arroyo de Totalán',
                buildingNumber: '36', zipCode: '', district: '',
                city: 'Rincón de la Victoria', geoZone: 'Málaga',
            },
            'Carrefour Express': {
                chain: 'carrefour', storeName: 'Carrefour Express',
                streetType: 'avenue', streetAddress: 'del Mediterráneo',
                buildingNumber: '12', zipCode: '', district: '',
                city: 'Rincón de la Victoria', geoZone: 'Málaga',
            },
            'Carrefour Market': {
                chain: 'carrefour', storeName: 'Carrefour Market',
                streetType: 'square', streetAddress: 'Mayor',
                buildingNumber: '5', zipCode: '', district: '',
                city: 'Rincón de la Victoria', geoZone: 'Málaga',
            },
        };

        // ── Detectar modo edición por parámetro URL: ?edit=NombreTienda ─────────
        const params   = new URLSearchParams(window.location.search);
        const editName = params.get('edit');
        const isEdit   = Boolean(editName && storeData[editName]);

        if (isEdit) {
            // Cambiar títulos
            document.getElementById('form-title').textContent     = 'Editar Tienda';
            document.getElementById('form-subtitle').textContent  = `Modificando datos de "${editName}"`;
            document.getElementById('save-popup-title').textContent = '¿Guardar cambios?';
            document.getElementById('save-popup-msg').textContent   = `Se actualizarán los datos de "${editName}".`;

            // Precargar campos
            const d = storeData[editName];
            document.getElementById('chain-select').value    = d.chain;
            document.getElementById('store-name').value      = d.storeName;
            document.getElementById('street-type').value     = d.streetType;
            document.getElementById('street-address').value  = d.streetAddress;
            document.getElementById('building-number').value = d.buildingNumber;
            document.getElementById('zip-code').value        = d.zipCode;
            document.getElementById('district-name').value   = d.district;
            document.getElementById('city-name').value       = d.city;
            document.getElementById('geo-zone').value        = d.geoZone;
        }

        // ── Popup de confirmación de guardado ────────────────────────────────────
        const saveOverlay  = document.getElementById('save-overlay');
        const btnSave      = document.getElementById('btn-save');
        const btnCancelSave  = document.getElementById('btn-cancel-save');
        const btnConfirmSave = document.getElementById('btn-confirm-save');
        const form         = document.getElementById('store-form');

        btnSave.addEventListener('click', () => {
            // Primero validar el formulario nativo
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            saveOverlay.classList.add('active');
        });

        btnCancelSave.addEventListener('click', () => {
            saveOverlay.classList.remove('active');
        });

        // Cerrar al pulsar fuera del popup
        saveOverlay.addEventListener('click', (e) => {
            if (e.target === saveOverlay) saveOverlay.classList.remove('active');
        });

        btnConfirmSave.addEventListener('click', () => {
            // Aquí iría la llamada al servidor (fetch/submit).
            // Por ahora redirigimos directamente a la lista.
            window.location.href = 'InformacionTienda.html';
        });

    });
</script>

</body>
</html>
