<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación de turnos</title>
    <link rel="stylesheet" href="../css/AsignaciónTurnos.css">
    <link rel="stylesheet" href="../css/Sidebar.css">

    <script src="../javascript/Sidebar.js" defer></script>
    <script src="../javascript/IncludeHTML.js"></script>
    <script src="../javascript/AsignaciónTurnos.js" defer></script>
</head>
<body>

<div class="app-container">

    <aside class="sidebar">
        <include-html src="../html/Sidebar.html"></include-html>
    </aside>

    <div class="right-content">

            <header class="main-header">
                <nav>
                    <div class="header-branding">
                        <img src="/images/icono.png" alt="App Icon" class="header-logo">
                        <div class="header-titles">
                            <h1>Asignación de turnos</h1>
                            <p>Gestión de horarios para voluntarios</p>
                        </div>
                    </div>
                    <button class="btn--secondary" id="btn-notifications">Notificaciones</button>
                </nav>
            </header>

            <div class="main-layout">
                <main>
                    <form id="form-voluntario">
                            <div class="list-container">
                                <div class="list-header">
                                    <h2>Listado de Voluntarios</h2>
                                    <button type="button" class="btn-add"
                                            onclick="window.location.href='RegistroVoluntarios.html'">Añadir</button>
                                    <p id="contador-voluntarios">Cargando...</p>
                                </div>
                                <div class="table-wrapper">
                                    <table class="data-table">
                                        <thead>
                                        <tr>
                                            <th>Nombre</th>
                                            <th>Email</th>
                                            <th>Teléfono</th>
                                            <th>Acciones</th>
                                        </tr>
                                        </thead>
                                        <tbody id="tabla-voluntarios">
                                        <tr><td colspan="4" style="text-align: center; padding: 20px;">Cargando...</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        <div class="list-container">
                                <div class="list-header">
                                    <h2>Selección de camapaña y fecha </h2> <br>
                                </div>

                                <div class="field-group">
                                        <input type="checkbox" name="campanya" value="GR"> GR
                                        <input type="checkbox" name="campanya" value="Primavera"> Primavera
                                </div>

                                <br>

                                <div class="field-group">
                                    Selección de fechas <br> <br>
                                    <div class="field-group">
                                        <div class="date-group">
                                            <label for="desde">Desde:</label>
                                            <input type="date" id="desde" name="fecha_desde">
                                        </div>
                                        <div class="date-group">
                                            <label for="hasta">Hasta:</label>
                                            <input type="date" id="hasta" name="fecha_hasta">
                                        </div>
                                    </div>
                                </div>
                        </div>

                        <div class="list-container">
                            <div class="list-header">
                                <h2>Asignación de fechas</h2>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Tienda</th>
                                        <th>Domicilio</th>
                                        <th>Localidad</th>
                                        <th>Capitán</th>
                                        <th>Turnos</th>
                                        <th>Observaciones</th>

                                    </tr>
                                </thead>
                            </table>
                        </div>
                    </form>
                </main>
            </div>
    </div>
</div>

</body>
</html>
