<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/Administrador.css">
    <link rel="stylesheet" href="../css/Sidebar.css">
    <link rel="stylesheet" href="../css/Header.css">
    <script src="../javascript/IncludeHTML.js"></script>
    <script src="../javascript/Sidebar.js" defer></script>
    <script src="../javascript/Administrador.js" defer></script>
    <script src="../javascript/Header.js"></script>
    <title>Dashboard - Vista de administrador</title>
</head>

<body>
    <div class="main-container">

        <!-- <aside class="sidebar">
            <include-html src="../html/Sidebar.html"></include-html>
        </aside> -->

        <div class="right-container">
            <!-- <header class="main-header">
                <include-html src="../html/header.html"></include-html>
            </header> -->

            <main class="dashboard-container">
                <!-- TARJETAS DE RESUMEN -->
                <section class="grid">
                    <div class="card">
                        <h3>Campañas Activas</h3>
                        <div class="card" id="stat-campaigns-value"></div>
                        <p class="card" id="stat-campaigns-subtitle">Cargando...</p>
                    </div>
                    <div class="card">
                        <h3>Tiendas Totales</h3>
                        <div class="card" id="stat-stores-value"></div>
                        <p class="card" id="stat-stores-subtitle">Cargando...</p>
                    </div>
                    <div class="card">
                        <h3>Colaboradores</h3>
                        <div class="card" id="stat-collaborators-value"></div>
                        <p class="card" id="stat-collaborators-subtitle">Cargando...</p>
                    </div>
                    <div class="card">
                        <h3>Coordinadores</h3>
                        <div class="card" id="stat-coordinators-value"></div>
                        <p class="card" id="stat-coordinators-subtitle">Cargando...</p>
                    </div>
                </section>

                <section class="dashboard-middle">
                    <!-- PRÓXIMAS CAMPAÑAS -->
                    <div class="upcoming-campaigns">
                        <div class="header-upcoming-campaigns">
                            <div>
                                <h2>Próximas Campañas</h2>
                                <p>Campañas programadas</p>
                            </div>
                            <button class="btn-view-all" onclick="window.location.href='Campana.html'">Ver
                                todas</button>
                        </div>
                        <div class="campaign-container" id="campaign-container">
                            <!-- Se rellena desde JS -->
                        </div>
                    </div>

                    <!-- COBERTURA POR ZONA -->
                    <div class="zone-coverage panel">
                        <div class="panel-header">
                            <h2>Cobertura por Zona</h2>
                            <p>Número de tiendas por zona</p>
                        </div>
                        <div class="shops-list" id="shops-list">
                            <!-- Se rellena desde JS -->
                        </div>
                    </div>
                </section>

            </main>
        </div>
    </div>
</body>

</html>
