1. ¿Una campaña se considera activa por fechas o como?-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Creacion de Campaña</title>
</head>
<body>
    <h1>Creación de campaña</h1>
    <p>Configure los datos de la nueva campaña y seleccione las cadenas participantes</p>
    <form action="#" method="POST">
        <fieldset>
            <label for="nombre-campanya">Nombre Campaña:</label>
            <input type="text" id="nombre-campanya" name="nombre-campanya" required>
            <br>
            <label for="fecha-inicio">Fecha Inicio</label>
            <input type="date" id="fecha-inicio" name="fecha-inicio" required>
            <br>
            <label for="fecha-final">Fecha Final</label>
            <input type="date" id="fecha-final" name="fecha-final" required>
        </fieldset>
        <fieldset>
            <p>Selecciona las cadenas participantes</p>
            <input type="checkbox" id="mercadona-elegido" name="mercadona-elegido">
            <label for="mercadona-elegido">Mercadona</label>
            <input type="checkbox" id="carrefour-elegido" name="carrefour-elegido">
            <label for="carrefour-elegido">Carrefour</label>
            <input type="checkbox" id="dia-elegido" name="dia-elegido">
            <label for="dia-elegido">Dia</label>
        </fieldset>
            <button type="submit">Crear Campaña</button>
            <button type="reset">Cancelar</button>
    </form>
</body>
</html>
