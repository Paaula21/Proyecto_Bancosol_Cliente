<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/Administrador.css">
    <link rel="stylesheet" href="../css/EditarCampana.css">
    
    <script src="../javascript/IncludeHTML.js"></script>
    <script src="../javascript/Sidebar.js" defer></script>
    <title>Editar Campaña</title>
</head>
<body>
    <div class="main-container">
        <!-- Barra lateral -->
        <aside class="sidebar">
            <include-html src="../html/Sidebar.html"></include-html>
        </aside>

        <div class="right-container">
            <header class="header-dashboard">
                <div class="header-left-group">
                    <img src="../images/icono.png" alt="App Icon" class="header-logo">
                    <div class="header-titles">
                        <h1>Edición de Campaña</h1>
                        <p>Modifique los detalles generales y las cadenas participantes</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="notification-btn" title="Notificaciones">!</button>
                </div>
            </header>

            <div class="form-container">
                <form action="#" method="POST" class="form-grid-layout">
                    
                    <div class="form-card">
                        <fieldset>
                            <legend>Datos de la campaña</legend>
                            
                            <div class="form-group">
                                <label for="nombre-campanya">Nombre de la campaña</label>
                                <input type="text" id="nombre-campanya" name="nombre-campanya" value="Campaña Verano 2024" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="fecha-inicio">Fecha de Inicio</label>
                                <input type="date" id="fecha-inicio" name="fecha-inicio" value="2024-05-15" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="fecha-final">Fecha de Finalización</label>
                                <input type="date" id="fecha-final" name="fecha-final" value="2024-08-20" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="estado">Estado actual</label>
                                <select id="estado" name="estado">
                                    <option value="pendiente">Pendiente</option>
                                    <option value="en-curso" selected>En curso</option>
                                    <option value="finalizada">Finalizada</option>
                                    <option value="cancelada">Cancelada</option>
                                </select>
                            </div>
                        </fieldset>

                        <div class="form-actions">
                            <button type="submit" class="btn-submit">Guardar Cambios</button>
                            <button type="reset" class="btn-cancel">Descartar</button>
                        </div>
                    </div>

                    <div class="form-card">
                        <fieldset>
                            <legend>Cadenas Participantes</legend>
                            <p class="checkbox-section-title">Seleccione las cadenas que forman parte de esta campaña:</p>
                            
                            <div class="checkbox-list">
                                <label class="checkbox-group">
                                    <input type="checkbox" id="mercadona-elegido" name="mercadona-elegido" checked>
                                    Mercadona
                                </label>
                                
                                <label class="checkbox-group">
                                    <input type="checkbox" id="carrefour-elegido" name="carrefour-elegido">
                                    Carrefour
                                </label>
                                
                                <label class="checkbox-group">
                                    <input type="checkbox" id="dia-elegido" name="dia-elegido" checked>
                                    Dia
                                </label>
                            </div>
                        </fieldset>
                    </div>

                </form>
            </div>
        </div>
    </div>
</body>
</html>
