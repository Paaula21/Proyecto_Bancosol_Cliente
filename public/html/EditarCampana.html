<div id="edit-campaign-container" class="datos-colaborador" style="display: none;">
    <h3 class="ficha-titulo-principal">Editar Campaña</h3>

    <form id="form-edit-campaign">

        <div class="ficha-tarjeta-info tarjeta-cabecera-edit">
            <h5>Nombre de la campaña</h5>
            <input type="text" id="name-campanya" class="input-ficha-lateral input-nombre-principal" required
                placeholder="ej., Campaña de Verano">
        </div>

        <div class="ficha-tarjeta-info">
            <h5>Fechas</h5>
            <div class="campo-formulario-ficha">
                <label for="initial-date"><strong>Fecha de Inicio:</strong></label>
                <input type="date" id="initial-date" class="input-ficha-lateral" required>
            </div>
            <div class="campo-formulario-ficha">
                <label for="final-date"><strong>Fecha de Fin:</strong></label>
                <input type="date" id="final-date" class="input-ficha-lateral" required>
            </div>
        </div>

        <div class="ficha-tarjeta-info">
            <h5>Estado</h5>
            <div class="campo-formulario-ficha">
                <label for="status"><strong>Estado actual:</strong></label>
                <select id="status" class="select-ficha-lateral" required>
                    <option value="Planificada">Planificada</option>
                    <option value="Activa">Activa</option>
                    <option value="Completada">Completada</option>
                    <option value="Finalizada">Finalizada</option>
                    <option value="Cancelada">Cancelada</option>
                </select>
            </div>
        </div>

        <div class="ficha-tarjeta-info sin-margen-inferior">
            <h5>Cadenas Participantes</h5>
            <p class="checkbox-section-title" style="margin-bottom: 10px; font-size: 14px; color: #555;">Seleccione las
                cadenas:</p>
            <div class="checkbox-list" id="checkbox-list">
                <!-- Se rellena desde JS -->
            </div>
        </div>
    </form>
</div>
