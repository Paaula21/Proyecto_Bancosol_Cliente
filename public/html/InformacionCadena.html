<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cadenas</title>
    <link rel="stylesheet" href="../css/InformacionCadena.css">
    <link rel="stylesheet" href="../css/TablaEstilos.css">
    <link rel="stylesheet" href="../css/Common.css">
    <link rel="stylesheet" href="../css/Sidebar.css">
    <link rel="stylesheet" href="../css/popUpRegistro.css">
    <link rel="stylesheet" href="../css/Header.css">
    <link rel="stylesheet" href="../css/DetalleColaborador.css">
    <link rel="stylesheet" href="../css/EditarAnadirColaborador.css">

    <script src="../javascript/InformacionCadena.js" defer></script>
    <script src="../javascript/EditarCadena.js" defer></script>
    <script src="../javascript/IncludeHTML.js"></script>
    <script src="../javascript/popUpRegistro.js"></script>
    <script src="../javascript/Sidebar.js" defer></script>
    <script src="../javascript/Header.js"></script>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <include-html src="../html/Sidebar.html"></include-html>
    </aside>
    <div class="right-content">
        <header class="main-header">
            <include-html src="../html/header.html"></include-html>
        </header>


        <div class="main-layout">
            <main>
                <!--FILTROS-->
                <form>
                    <section class="filters">
                        <div class="filter-group">
                            <label for="filter-chain">Nombre</label>
                            <select id="filter-chain" name="chain">
                                 <option value="">Todas las cadenas</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="filter-campaign">Campaña</label>
                            <select id="filter-campaign" name="campaign">
                                <option value="">Todas las campañas</option>
                            </select>
                        </div>
                        <div class="filter-button">
                            <button type="button" id="btn-filter" class="btn btn--primary">Filtrar</button>
                        </div>
                    </section>
                </form>

                <div class="content-wrapper">
                    <div class="list-container">
                        <div class="list-header">
                            <h2>Listado de Cadenas</h2>
                            <button type="button" id="btn-add" class="btn btn--primary">Añadir Cadena</button>
                            <p id="chains-counter">Cargando...</p>
                        </div>

                        <div class="table-wrapper">
                            <table class="data-table">
                                <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Nº Establecimientos</th>
                                </tr>
                                </thead>
                                <tbody id="chains-table">
                                <tr><td colspan="2" class="table-cell-loading">Cargando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <aside class="detail-panel">
                        <div class="detail-content">
                            <include-html src="../html/DetalleCadena.html"></include-html>
                            <include-html src="../html/EditarCadena.html"></include-html>
                        </div>

                        <div class="detail-actions-sticky" id="detail-actions" style="display: none;">
                            <button type="button" id="btn-edit" class="btn btn--primary" disabled>Editar</button>
                            <button type="button" id="btn-delete" class="btn btn--delete" disabled>Eliminar</button>
                        </div>
                        <div class="detail-actions-sticky" id="form-actions-bar" style="display: none;">
                            <button type="submit" form="chain-form" class="btn btn--primary">Guardar</button>
                            <button type="button" id="btn-cancel-form" class="btn btn--cancel">Cancelar</button>
                        </div>
                    </aside>
                </div>
            </main>
        </div>
    </div>
</div>

<div class="overlay" id="delete-overlay">
    <div class="popup" id="delete-popup">
        <h3>¿Eliminar cadena?</h3>
        <p>Esta acción no se puede deshacer. ¿Estás seguro de que deseas eliminar esta cadena de la base de datos?</p>
        <div>
            <form action="">
                <button class="btn btn--delete" id="btn-confirm-delete">Eliminar</button>
                <button class="btn btn--cancel" id="btn-cancel-delete">Cancelar</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
