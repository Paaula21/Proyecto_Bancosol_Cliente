<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Colaboradores</title>
    <link rel="stylesheet" href="../css/Colaboradores.css">
    <link rel="stylesheet" href="../css/Sidebar.css">
    <link rel="stylesheet" href="../css/DetalleColaborador.css">
    <link rel="stylesheet" href="../css/popUpRegistro.css">
    <link rel="stylesheet" href="../css/EditarAnadirColaborador.css">
    <link rel="stylesheet" href="../css/Header.css">
    <link rel="stylesheet" href="../css/Common.css">
    <script src="../javascript/IncludeHTML.js"></script>
    <script src="../javascript/Colaboradores.js"></script>
    <script src="../javascript/EditarColaborador.js"></script>
    <script src="../javascript/AnadirColaborador.js"></script>
    <script src="../javascript/Header.js"></script>
    <script src="../javascript/Sidebar.js"></script>
</head>

<body>
    <div class="main-layout">
        <aside class="sidebar">
            <include-html src="../html/Sidebar.html"></include-html>
        </aside>

        <div class="right-content">
            <!-- Cabecera -->
            <header class="main-header">
                <include-html src="../html/header.html"></include-html>
            </header>

            <main>
                <!-- Filtros -->
                <section class="filters">
                    <div class="filter-group">
                        <label>Zona Geográfica</label>
                        <select id="filter-zona">
                            <option value="Todas">Todas</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Buscar</label>
                        <input type="text" id="input-search" placeholder="Nombre o código del colaborador...">
                    </div>
                    <div class="filter-button">
                        <button type="button" class="btn btn--primary" id="btn-filter">Filtrar</button>
                    </div>
                </section>

                <hr>
                <!-- Listado de colaboradores -->
                <div class="content-wrapper">
                    <section class="list-container">
                        <header class="list-header">
                            <h2>Listado de Colaboradores</h2>
                            <p id="contador-colaboradores">Cargando...</p>
                            <button type="button" class="btn btn--primary" id="btn-abrir-registro">
                                Añadir Colaborador
                            </button>
                        </header>
                        <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Colaborador</th>
                                    <th>Localidad</th>
                                    <th>Zona</th>
                                    <th>Contacto</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-colaboradores">
                                <tr>
                                    <td colspan="4" style="text-align: center; padding: 20px;">Cargando...</td>
                                </tr>
                            </tbody>
                        </table>
                        </div>
                    </section>
                    <!-- Panel de detalles del colaborador -->
                    <aside class="detail-panel">
                        <div class="detail-content">
                            <include-html src="../html/DetalleColaborador.html"></include-html>
                            <include-html src="../html/EditarColaborador.html"></include-html>
                            <include-html src="../html/AnadirColaborador.html"></include-html>
                        </div>
                        <div class="detail-actions-sticky" id="acciones-detalle-colaborador" style="display: none;">
                            <button type="button" id="btn-editar-colaborador" class="btn btn--primary">
                                Editar Colaborador
                            </button>
                            <button type="button" id="btn-eliminar-colaborador" class="btn btn--delete">
                                Eliminar
                            </button>
                        </div>
                        <div class="detail-actions-sticky" id="acciones-edicion-colaborador" style="display: none;">
                            <button type="submit" form="form-edicion-colaborador" id="btn-guardar-cambios" class="btn btn--primary">
                                Guardar Cambios
                            </button>
                            <button type="button" id="btn-cancelar-edicion" class="btn btn--cancel">
                                Cancelar
                            </button>
                        </div>
                        <div class="detail-actions-sticky" id="acciones-anadir-colaborador" style="display: none;">
                            <button type="submit" form="form-nuevo-colaborador-lateral" id="btn-guardar-nuevo" class="btn btn--primary">
                                Guardar Colaborador
                            </button>
                            <button type="button" id="btn-cancelar-nuevo" class="btn btn--cancel">
                                Cancelar
                            </button>
                        </div>
                    </aside>
                </div>
            </main>
        </div>
    </div>
    <div class="overlay" id="overlay-eliminar">
        <div class="popup" id="popup-eliminar">
            <h3>¿Eliminar Colaborador?</h3>
            <p>Esta acción no se puede deshacer. ¿Estás seguro de que deseas eliminar a este colaborador de la base de
                datos?</p>

            <div class="popup-actions">
                <form action="">
                    <button class="btn-add btn-rojo" id="btn-confirmar-eliminar">Eliminar</button>
                    <button class="btn-cerrar-popup" id="btn-cancelar-eliminar">Cancelar</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
