<!--PROCESO DE ADAPTACION-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cadenas</title>
    <link rel="stylesheet" href="../css/InformacionCadena.css">
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <!--PENDIENTE-->
    </aside>
    <div class="right-content">
        <header class="main-header">
            <nav>
                <div class="header-branding">
                    <img src="../images/icono.png" alt="App Icon" class="header-logo">
                    <div class="header-titles">
                        <h1>Cadena</h1>
                        <p>Panel de administración para registrar y gestionar las marcas de los supermercados</p>
                    </div>
                </div>
                <button class="btn btn--secondary" id="btn-notifications">Notificaciones</button>
            </nav>
        </header>

        <div class="main-layout">
            <main>
                <!--FILTROS-->
                <form>
                    <section class="filters">
                        <!--TIENDA-->
                        <div class="filter-group">
                            <label for="filter-chain">Nombre</label>
                            <select id="filter-chain" name="chain">
                                <option value="">Todas las cadenas</option>
                                <option value="mercadona">Mercadona</option>
                                <option value="carrefour">Carrefour</option>
                                <option value="dia">Dia</option>
                            </select>
                        </div>

                        <!--DIRECCIONES-->
                        <div class="filter-group small-box">
                            <label for="filter-type">Tipo de Vía</label>
                            <select id="filter-type" name="type">
                                <option value="">Sin especificar</option>
                                <option value="street">Calle</option>
                                <option value="avenue">Avenida</option>
                                <option value="square">Plaza</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="filter-street">Calle</label>
                            <input type="text" id="filter-street" name="street" placeholder="Nombre">
                        </div>
                        <div class="filter-group small-box">
                            <label for="filter-code">Cód. Postal</label>
                            <input type="text" id="filter-code" name="code" minlength="5" maxlength="5" pattern="[0-9]{5}"
                                   title="Por favor, introduce exactamente 5 números" placeholder="29XXX">
                        </div>
                        <div class="filter-group small-box">
                            <label for="filter-district">Distrito</label>
                            <input type="text" id="filter-district" name="district" minlength="1" maxlength="2" placeholder="Ej: 3" >
                        </div>
                        <div class="filter-group">
                            <label for="filter-city">Localidad</label>
                            <input type="text" id="filter-city" name="city" placeholder="Buscar localidad...">
                        </div>
                        <div class="filter-group">
                            <label for="filter-zone">Zona Geográfica</label>
                            <input type="text" id="filter-zone" name="zone" placeholder="Buscar zona geografica...">
                        </div>
                        <div class="filter-group small-box">
                            <label for="filter-gr">¿Gran Recogida?</label>
                            <select id="filter-gr" name="gr">
                                <option value="yes">Si</option>
                                <option value="no">No</option>
                            </select>
                        </div>
                        <div class="filter-group small-box">
                            <label for="filter-primavera">¿Primavera?</label>
                            <select id="filter-primavera" name="primavera">
                                <option value="yes">Si</option>
                                <option value="no">No</option>
                            </select>
                        </div>

                        <div class="filter-button">
                            <button type="submit" class="btn btn--primary">Filtrar</button>
                        </div>
                    </section>
                </form>

                <section class="content-wrapper">
                    <div class="list-container">
                        <div class="list-header">
                            <h2>Listado de Cadenas</h2>
                            <div class="list-actions">
                                <a href="NuevaCadena.html">
                                    <button type="button" class="btn btn--primary">+ Añadir</button>
                                </a>
                            </div>
                        </div>

                        <table>
                            <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Numero de Establecimientos</th>
                                <th>¿Gran Recogida?</th>
                                <th>¿Primavera?</th>
                                <th>Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td><strong>Carrefour</strong></td>
                                <td>76</td>
                                <td>Sí</td>
                                <td>Sí</td>
                                <td>
                                    <button type="button" class="btn btn--secondary">Editar</button>
                                    <button type="button" class="btn btn--secondary">Borrar</button>
                                </td>
                            </tr>
                            <tr>
                                <td><strong>Mercadona</strong></td>
                                <td>67</td>
                                <td>Sí</td>
                                <td>No</td>
                                <td>
                                    <button type="button" class="btn btn--secondary">Editar</button>
                                    <button type="button" class="btn btn--secondary">Borrar</button>
                                </td>
                            </tr>
                            <tr>
                                <td><strong>Dia</strong></td>
                                <td>32</td>
                                <td>Sí</td>
                                <td>Sí</td>
                                <td>
                                    <button type="button" class="btn btn--secondary">Editar</button>
                                    <button type="button" class="btn btn--secondary">Borrar</button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                </section>
            </main>
        </div>
    </div>
</div>

</body>
</html>
