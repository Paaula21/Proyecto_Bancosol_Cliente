<!-- Mensaje inicial -->
<div id="empty-state-campaign" class="estado-vacio">
    <h3>Detalle de la Campaña</h3>
    <p>Haz clic en una campaña de la lista para ver sus detalles.</p>
</div>

<!-- Datos de la campaña -->
<div id="campaign-data" class="datos-colaborador" style="display: none;">
    <h3 class="ficha-titulo-principal">Ficha de la Campaña</h3>

    <div class="ficha-cabecera">
        <div class="ficha-titulos">
            <h4 id="campaign-name" class="ficha-nombre">---</h4>
            <span id="campaign-code" class="ficha-etiqueta-codigo">---</span>
        </div>
    </div>

    <div class="ficha-tarjeta-info">
        <h5>Fechas</h5>
        <p><strong>Fecha de Inicio:</strong> <span id="campaign-start">---</span></p>
        <p><strong>Fecha de Fin:</strong> <span id="campaign-end">---</span></p>
    </div>

    <div class="ficha-tarjeta-info">
        <h5>Estado</h5>
        <p><span id="campaign-status" class="estado-badge">---</span></p>
    </div>

    <div class="ficha-tarjeta-info sin-margen-inferior">
        <h5>Cadenas Participantes</h5>
        <ul id="campaign-chains" class="lista-cadenas-detalle">
            <!-- Lista de cadenas -->
        </ul>
    </div>
</div>
