<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/Administrador.css">
  <link rel="stylesheet" href="../css/EditarVoluntario.css">
  <link rel="stylesheet" href="../css/popUpRegistro.css">

  <script src="../javascript/IncludeHTML.js"></script>
  <script src="../javascript/Sidebar.js" defer></script>
  <script src="../javascript/EditarVoluntario.js" defer></script>
  <script src="../javascript/AsignaciónTurnos.js" defer></script>
  <title>Editar Voluntario</title>
</head>

<body>
<div class="main-container">
  <aside class="sidebar">
    <include-html src="../html/Sidebar.html"></include-html>
  </aside>

  <div class="right-container">
    <header class="header-dashboard">
      <img src="../images/icono.png" alt="App Icon" class="header-logo">
      <div class="header-titles">
        <h1>Edición de Voluntario</h1>
        <p>Modifique los datos personales y la disponibilidad del voluntario</p>
      </div>
      <div class="header-actions">
        <button class="notification-btn" title="Notificaciones">
          <p>N</p>
        </button>
      </div>
    </header>

    <div class="form-container">
      <form action="#" method="POST" class="form-edit" id="form-edit-voluntario">

        <div class="form-card">
          <fieldset>
            <legend>Datos Personales</legend>

            <div class="form-group">
              <label for="nombre">Nombre Completo</label>
              <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="form-group">
              <label for="email">Correo Electrónico</label>
              <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
              <label for="telefono">Teléfono</label>
              <input type="tel" id="telefono" name="telefono" required>
            </div>

            <div class="form-group">
              <label>Disponibilidad (Turnos)</label>
              <div class="checkbox-list">
                <label class="checkbox-group">
                  <input type="checkbox" name="disponibilidad" value="Mañana"> Mañana
                </label>
                <label class="checkbox-group">
                  <input type="checkbox" name="disponibilidad" value="Tarde"> Tarde
                </label>
                <label class="checkbox-group">
                  <input type="checkbox" name="disponibilidad" value="Noche"> Noche
                </label>
              </div>
            </div>
          </fieldset>

          <div class="form-actions">
            <button type="submit" class="btn-submit" id="btn-guardar">Guardar Cambios</button>
            <button type="button" class="btn-cancel" id="btn-descartar">Descartar</button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>

<div class="overlay" id="overlay-confirmar">
  <div class="popup" id="popup-confirmar">
    <h3>¿Confirmar cambios?</h3>
    <p>¿Estás seguro de que deseas guardar los cambios realizados en este voluntario?</p>
    <div class="popup-actions">
      <button type="button" class="btn-add" id="btn-confirmar-edicion">Confirmar</button>
      <button type="button" class="btn-cerrar-popup" id="btn-cancelar-edicion">Cancelar</button>
    </div>
  </div>
</div>
</body>

</html>
